# XSight local backend — Phase 6 mock service skeletons.
# All four services are independently deployable FastAPI apps; this file
# just runs them side by side with fixed local ports for curl/Postman
# testing. No shared network dependency beyond the default compose network,
# and no external services (databases, model servers) are wired up yet.

services:
  rag_service:
    build:
      context: ./services/rag_service
    container_name: xsight-rag-service
    ports:
      - "8001:8001"
    environment:
      - HISTORICAL_CALLS_CSV_PATH=/data/historical_sales_calls.csv
    volumes:
      - ./data:/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health', timeout=2).status==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  call_signal_analyser:
    build:
      context: ./services/call_signal_analyser
    container_name: xsight-call-signal-analyser
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health', timeout=2).status==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  guardrails_service:
    build:
      context: ./services/guardrails_service
    container_name: xsight-guardrails-service
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8003/health', timeout=2).status==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  langgraph_agent:
    build:
      context: ./services/langgraph_agent
    container_name: xsight-langgraph-agent
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8004/health', timeout=2).status==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
